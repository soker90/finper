version: "3.9"
services:
  api:
    image: finper-api:latest
    env_file: .env
    environment:
      DATABASE_FILE: /home/node/app/data/finper.db
      JWT_SECRET: ${JWT_SECRET}
      SALT_ROUNDS: ${SALT_ROUNDS}
      LOKI_USER: ${LOKI_USER}
      LOKI_PASSWORD: ${LOKI_PASSWORD}
      TICKET_BOT_URL: ${TICKET_BOT_URL}
      TICKET_BOT_API_KEY: ${TICKET_BOT_API_KEY}
    build:
      context: .
      dockerfile: ./packages/api/Dockerfile
    volumes:
      - finperdb:/home/node/app/data
    ports:
      - 3008:3008
    networks:
      - finper-network

volumes:
  finperdb:
    driver: local

networks:
  finper-network:
    driver: bridge
