# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    labels:
      - "github-actions"
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/packages/api"
    package-manager: "pnpm"
    schedule:
      interval: "weekly"
    cooldown:
      semver-patch-days: 1
      semver-minor-days: 7
      semver-major-days: 7
    labels:
      - "api"
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/packages/client"
    package-manager: "pnpm"
    schedule:
      interval: "weekly"
    cooldown:
      semver-patch-days: 1
      semver-minor-days: 7
      semver-major-days: 7
    labels:
      - "ui"
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/packages/models"
    package-manager: "pnpm"
    schedule:
      interval: "weekly"
    cooldown:
      semver-patch-days: 1
      semver-minor-days: 7
      semver-major-days: 7
    labels:
      - "models"
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/packages/bot"
    package-manager: "pnpm"
    schedule:
      interval: "weekly"
    cooldown:
      semver-patch-days: 1
      semver-minor-days: 7
      semver-major-days: 7
    labels:
      - "bot"
      - "dependencies"
