# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  ## Types ##
  build-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @soker90/finper-types
      - name: Build
        run: make build-types
      - uses: actions/upload-artifact@v7
        with:
          name: types
          path: packages/types/dist

  ## DB ##
  lint-db:
    needs: [ build-types ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'
      - uses: actions/download-artifact@v8
        with:
          name: types
          path: packages/types/dist
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: make lint-db

  build-db:
    needs: [ build-types ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'
      - uses: actions/download-artifact@v8
        with:
          name: types
          path: packages/types/dist
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: make build-db
      - uses: actions/upload-artifact@v7
        with:
          name: db
          path: packages/db/dist

  test-db:
    needs: [ lint-db, build-db ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test
        run: make test-db
      - name: Codecov
        uses: codecov/codecov-action@v6
        with:
          flags: db

  ## API ##
  lint-api:
    needs: [ build-types, build-db ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'
      - uses: actions/download-artifact@v8
        with:
          name: types
          path: packages/types/dist
      - uses: actions/download-artifact@v8
        with:
          name: db
          path: packages/db/dist
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @soker90/finper-api...
      - name: Lint
        run: make lint-api

  build-api:
    needs: [ build-db ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'
      - uses: actions/download-artifact@v8
        with:
          name: types
          path: packages/types/dist
      - uses: actions/download-artifact@v8
        with:
          name: db
          path: packages/db/dist
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @soker90/finper-api...
      - name: Build
        run: make build-api

  test-api:
    needs: [ lint-api, build-api ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'
      - uses: actions/download-artifact@v8
        with:
          name: types
          path: packages/types/dist
      - uses: actions/download-artifact@v8
        with:
          name: db
          path: packages/db/dist
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @soker90/finper-api...
      - name: Test
        run: make test-api
      - name: Codecov
        uses: codecov/codecov-action@v6
        with:
          flags: api

  ## Frontend ##
  lint-client:
    needs: [ build-types ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'
      - uses: actions/download-artifact@v8
        with:
          name: types
          path: packages/types/dist
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @soker90/finper-client...
      - name: Lint
        run: make lint-client

  build-client:
    needs: [ build-types ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'
      - uses: actions/download-artifact@v8
        with:
          name: types
          path: packages/types/dist
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @soker90/finper-client...
      - name: Build
        run: make build-client

  test-client:
    needs: [ lint-client, build-client ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @soker90/finper-client...
      - name: Test
        run: make test-client
      - name: Codecov
        uses: codecov/codecov-action@v6
        with:
          flags: client
